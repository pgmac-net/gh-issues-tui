name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_NET_RETRY: 5
  CARGO_HTTP_TIMEOUT: 120
  CARGO_HTTP_MULTIPLEX: false

permissions:
  contents: write

jobs:
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.tag.outputs.prerelease }}
    steps:
      - name: Check tag format
        id: tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Release tag: $TAG"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc[0-9]+$ ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Pre-release tag: $TAG"
          else
            echo "Invalid tag format: $TAG"
            echo "  Expected: v<major>.<minor>.<patch>      (release, on main)"
            echo "        or: v<major>.<minor>.<patch>-rc<N> (pre-release, on other branches)"
            exit 1
          fi

  build:
    name: Build (${{ matrix.target }})
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: gh-issues-linux-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: gh-issues-macos-aarch64

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: gh-issues-macos-x86_64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: gh-issues-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/gh-issues ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/gh-issues.exe ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create release
    needs: [validate, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum * > checksums.txt

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/*
          generate_release_notes: true
          prerelease: ${{ needs.validate.outputs.prerelease }}
