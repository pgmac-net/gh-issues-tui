name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_NET_RETRY: 5
  CARGO_HTTP_TIMEOUT: 120
  CARGO_HTTP_MULTIPLEX: false

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: fmt
        run: cargo fmt --check

  full:
    name: CI (${{ matrix.os }})
    if: github.event_name == 'pull_request'
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            allow_failure: false
          - os: macos-latest
            allow_failure: false
          - os: windows-latest
            allow_failure: true

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: test
        run: cargo test

      - name: build
        run: cargo build --release
